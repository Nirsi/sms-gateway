name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build Windows binary
        run: |
          New-Item -ItemType Directory -Force -Path dist
          go build -o dist/sms-gateway.exe .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sms-gateway.exe

      - name: Upload binary to VirusTotal
        continue-on-error: true
        shell: pwsh
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          if (-not $env:VIRUSTOTAL_API_KEY) {
            Write-Host "VIRUSTOTAL_API_KEY is not configured; skipping VirusTotal upload."
            exit 0
          }

          $file = "dist/sms-gateway.exe"
          if (-not (Test-Path $file)) {
            throw "VirusTotal upload file not found: $file"
          }

          $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLowerInvariant()
          $fileUrl = "https://www.virustotal.com/gui/file/$hash"

          curl.exe --fail --silent --show-error --request POST `
            --url "https://www.virustotal.com/api/v3/files" `
            --header "x-apikey: $env:VIRUSTOTAL_API_KEY" `
            --form "file=@$file"

          Write-Host "VirusTotal file URL: $fileUrl"
